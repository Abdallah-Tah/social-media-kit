<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Build With Abdallah Cover</title>
  <style>
    :root {
      --bg: #0d1628;
      --panel: #121e36;
      --panel-2: #172642;
      --blue: #2563eb;
      --sky: #93c5fd;
      --green: #34d399;
      --red: #ef4444;
      --white: #f8fafc;
      --muted: #94a3b8;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 1536px;
      height: 864px;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
      color: var(--white);
    }

    .cover {
      position: relative;
      width: 1536px;
      height: 864px;
      background:
        linear-gradient(rgba(37, 99, 235, .12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37, 99, 235, .12) 1px, transparent 1px),
        radial-gradient(circle at 74% 18%, rgba(37, 99, 235, .18), transparent 34%),
        var(--bg);
      background-size: 96px 96px, 96px 96px, auto, auto;
    }

    .top-red {
      position: absolute;
      inset: 0 0 auto 0;
      height: 14px;
      background: var(--red);
    }

    .top-blue {
      position: absolute;
      inset: 14px 0 auto 0;
      height: 8px;
      background: var(--blue);
    }

    .brand {
      position: absolute;
      left: 96px;
      top: 126px;
      color: var(--sky);
      font-size: 30px;
      line-height: 1;
      letter-spacing: 0;
      font-weight: 500;
    }

    .title {
      position: absolute;
      left: 96px;
      top: 206px;
      width: 704px;
      font-size: 68px;
      line-height: 1.08;
      font-weight: 850;
      letter-spacing: 0;
      text-wrap: balance;
      text-shadow: 4px 4px 0 rgba(0, 0, 0, .75);
    }

    .subtitle {
      position: absolute;
      left: 96px;
      top: 456px;
      width: 720px;
      color: var(--sky);
      font-size: 35px;
      line-height: 1.35;
      letter-spacing: 0;
      font-weight: 450;
      text-wrap: balance;
    }

    .editor {
      position: absolute;
      right: 156px;
      top: 130px;
      width: 560px;
      height: 330px;
      border-radius: 18px;
      background: var(--panel);
      box-shadow: 0 28px 70px rgba(0, 0, 0, .28);
      overflow: hidden;
    }

    .editor-top {
      height: 48px;
      background: var(--panel-2);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 22px;
    }

    .dot { width: 17px; height: 17px; border-radius: 50%; }
    .dot.red { background: #f87171; }
    .dot.yellow { background: #fbbf24; }
    .dot.green { background: #34d399; }

    .file {
      margin-left: 18px;
      color: var(--muted);
      font-size: 21px;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .code {
      padding: 30px 36px;
      font-family: "DejaVu Sans Mono", "SFMono-Regular", Consolas, monospace;
      font-size: 21px;
      line-height: 1.38;
      white-space: pre;
    }

    .code .muted { color: var(--muted); }
    .code .green { color: var(--green); }
    .code .white { color: var(--white); }

    .workflow {
      position: absolute;
      left: 150px;
      right: 150px;
      top: 570px;
      height: 104px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 26px;
      align-items: center;
    }

    .step {
      position: relative;
      min-width: 0;
      height: 104px;
      border-radius: 16px;
      border: 3px solid var(--blue);
      background: var(--panel-2);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      text-align: center;
      font-size: 28px;
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: 0;
      white-space: normal;
    }

    .step:not(:last-child)::after {
      content: "";
      position: absolute;
      right: -26px;
      top: 50%;
      width: 26px;
      height: 4px;
      transform: translateY(-50%);
      background: var(--sky);
    }

    .step:not(:last-child)::before {
      content: "";
      position: absolute;
      right: -30px;
      top: 50%;
      width: 0;
      height: 0;
      border-top: 11px solid transparent;
      border-bottom: 11px solid transparent;
      border-left: 15px solid var(--sky);
      transform: translateY(-50%);
    }

    .footer {
      position: absolute;
      left: 96px;
      bottom: 58px;
      color: var(--muted);
      font-size: 27px;
      line-height: 1;
      letter-spacing: 0;
      font-weight: 450;
    }

    .domain {
      position: absolute;
      right: 96px;
      bottom: 58px;
      color: var(--muted);
      font-size: 27px;
      line-height: 1;
      letter-spacing: 0;
      font-weight: 450;
    }
  </style>
</head>
<body>
  <main class="cover">
    <div class="top-red"></div>
    <div class="top-blue"></div>
    <div class="brand" id="brand"></div>
    <div class="title" id="title"></div>
    <div class="subtitle" id="subtitle"></div>

    <section class="editor" aria-label="Code preview">
      <div class="editor-top">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
        <div class="file" id="code-title"></div>
      </div>
      <div class="code" id="code"></div>
    </section>

    <section class="workflow" id="workflow" aria-label="Tutorial workflow"></section>
    <div class="footer" id="footer"></div>
    <div class="domain" id="domain"></div>
  </main>

  <script id="cover-data" type="application/json">__COVER_DATA__</script>
  <script>
    const data = JSON.parse(document.getElementById("cover-data").textContent);
    const setText = (id, value) => { document.getElementById(id).textContent = value || ""; };
    setText("brand", data.brand || "Build With Abdallah");
    setText("title", data.title);
    setText("subtitle", data.subtitle);
    setText("code-title", data.codeTitle || "Example.php");
    setText("footer", data.footer || "");
    setText("domain", data.domain || "buildwithabdallah.com");

    const code = document.getElementById("code");
    for (const line of data.codeLines || []) {
      const span = document.createElement("span");
      span.className = line.color || "white";
      span.textContent = line.text;
      code.appendChild(span);
      code.appendChild(document.createTextNode("\n"));
    }

    const workflow = document.getElementById("workflow");
    for (const label of (data.workflow || []).slice(0, 4)) {
      const step = document.createElement("div");
      step.className = "step";
      step.textContent = label;
      workflow.appendChild(step);
    }
  </script>
</body>
</html>
