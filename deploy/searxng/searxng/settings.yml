# Minimal SearXNG config for the Social Media Agent.
# The agent needs the JSON output format enabled (see search.formats).
use_default_settings: true

server:
  # Replace before exposing publicly:
  #   sed -i "s/change-me-please/$(openssl rand -hex 16)/" settings.yml
  secret_key: "change-me-please"
  limiter: false          # set true if you expose this instance publicly
  image_proxy: false

search:
  safe_search: 1
  formats:
    - html
    - json                # REQUIRED by the agent's SearXNG provider

engines:
  - name: wikipedia
    disabled: false
