<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; width: 1080px; height: 1920px; background: #0b0f14; color: #f4f7fb; font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; }
    .frame { position: relative; width: 1080px; height: 1920px; padding: 82px 74px; background: #0b0f14; overflow: hidden; }
    .top { display: flex; justify-content: space-between; color: #9fb0c3; font-size: 30px; }
    .brand { color: #56d364; font-weight: 800; }
    h1 { margin: 86px 0 28px; font-size: 62px; line-height: 1.08; letter-spacing: 0; }
    .caption { color: #cbd5e1; font-size: 38px; line-height: 1.24; margin-bottom: 56px; }
    .diagram { display: grid; place-items: center; }
    .node { width: 760px; min-height: 128px; border-radius: 8px; border: 3px solid #2f4052; background: #111820; display: grid; place-items: center; text-align: center; padding: 24px; color: #f4f7fb; font-size: 42px; font-weight: 800; }
    .arrow { color: #f4a261; font-size: 64px; line-height: 1.08; margin: 14px 0; font-weight: 900; }
    .takeaway { position: absolute; left: 74px; right: 74px; bottom: 190px; color: #f4f7fb; border-top: 4px solid #56d364; padding-top: 30px; font-size: 36px; line-height: 1.22; }
    .wm { position: absolute; right: 54px; bottom: 48px; display: flex; align-items: center; gap: 12px; color: #8b949e; font-size: 26px; }
    .wm-img { width: 76px; height: 76px; object-fit: contain; }
    .wm-text { width: 76px; height: 76px; border: 3px solid #56d364; color: #56d364; display: grid; place-items: center; font-weight: 900; }
  </style>
</head>
<body>
  <div class="frame">
    <div class="top"><div class="brand">Build With Abdallah</div><div>{{progress}}</div></div>
    <h1>{{title}}</h1>
    <div class="caption">{{caption}}</div>
    <div class="diagram">{{diagram}}</div>
    <div class="takeaway">{{takeaway}}</div>
    <div class="wm">{{watermark}}</div>
  </div>
</body>
</html>
