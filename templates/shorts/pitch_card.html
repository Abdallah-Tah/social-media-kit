<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
    :root {
      --navy: #071a44; --navy-2: #002b73; --blue: #0866ff; --text: #081b44;
      --muted: #40527a; --line: rgba(10, 42, 90, .13); --soft: rgba(8, 42, 96, .08);
      --bg: #f8fbff;
    }
    * { box-sizing: border-box; }
    body { margin: 0; width: 1080px; height: 1920px; color: var(--text);
           font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial, sans-serif; }
    .social-card { position: relative; width: 1080px; height: 1920px; overflow: hidden; isolation: isolate;
      background:
        radial-gradient(circle at 45% 42%, rgba(255,255,255,.92) 0 28%, transparent 58%),
        linear-gradient(135deg, #ffffff 0%, var(--bg) 58%, #ffffff 100%); }
    .social-card::before { content: "A"; position: absolute; right: 60px; top: 360px; font-size: 900px;
      line-height: 1; font-weight: 900; letter-spacing: -80px; color: rgba(6, 35, 84, .045); z-index: -1; }
    .corner { position: absolute; width: 270px; height: 270px;
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-2) 100%);
      border: 5px solid var(--blue); box-shadow: 0 18px 35px rgba(7, 26, 68, .18); border-radius: 34px; }
    .corner.top-right { top: -135px; right: -135px; transform: rotate(30deg); }
    .corner.bottom-left { bottom: -142px; left: -142px; transform: rotate(63deg); }
    .dots { position: absolute; display: grid; grid-template-columns: repeat(6, 10px); gap: 20px; opacity: .45; }
    .dots span { width: 10px; height: 10px; border-radius: 50%; background: #6b8fca; }
    .dots.top { top: 40px; left: 40px; }
    .dots.bottom { right: 48px; bottom: 150px; }
    .header { position: absolute; top: 96px; left: 78px; right: 78px; display: flex; align-items: center; gap: 28px; }
    .logo-mark { width: 124px; height: 124px; object-fit: contain; }
    .logo-fallback { width: 124px; height: 124px; display: grid; place-items: center; font-weight: 900;
      font-size: 92px; color: var(--blue); letter-spacing: -10px; }
    .vdivider { width: 3px; height: 110px; background: var(--blue); opacity: .75; }
    .brand-title { margin: 0; font-size: 54px; line-height: 1; font-weight: 850; letter-spacing: -1.3px; color: var(--navy); }
    .brand-title span { color: var(--blue); }
    .brand-subtitle { margin: 16px 0 0; font-size: 17px; font-weight: 750; letter-spacing: 7px;
      text-transform: uppercase; color: var(--navy); }
    .brand-subtitle b { color: var(--blue); margin: 0 12px; }
    .progress { position: absolute; top: 56px; right: 64px; z-index: 3; font-size: 30px; font-weight: 800; color: #ffffff; }
    .content { position: absolute; left: 78px; right: 78px; top: 320px; }
    .title { margin: 0; font-size: 86px; line-height: .98; font-weight: 900; letter-spacing: -2.8px;
      text-transform: uppercase; color: var(--navy); }
    .meta { margin-top: 26px; display: flex; align-items: center; gap: 20px; font-size: 33px; color: var(--muted); }
    .meta .mdot { width: 9px; height: 9px; border-radius: 50%; background: var(--blue); display: inline-block; }
    .slot { margin-top: 56px; }
    .footer { position: absolute; left: 60px; right: 60px; bottom: 56px; text-align: center; font-size: 26px;
      font-style: italic; color: var(--navy); letter-spacing: -.2px; }

    /* ── Pitch Agent content pieces (brand tokens) ── */
    .rows { display: flex; flex-direction: column; }
    .row { display: flex; align-items: center; gap: 26px; padding: 30px 6px; border-bottom: 1.5px solid var(--line); }
    .row:last-child { border-bottom: none; }
    .row .dot { width: 14px; height: 14px; border-radius: 50%; background: var(--blue); flex: 0 0 14px; }
    .row .label { font-size: 40px; font-weight: 800; color: var(--navy); flex: 1; }
    .row .tag { font-size: 30px; font-weight: 800; color: var(--blue); }
    .row .meta2 { font-size: 30px; font-weight: 600; color: var(--muted); width: 200px; text-align: right; }
    .vs-wrap { display: flex; align-items: center; justify-content: space-between; margin-top: 30px; }
    .vs-team { width: 380px; text-align: center; }
    .vs-team img { width: 280px; height: 187px; object-fit: cover; border-radius: 18px;
      box-shadow: 0 14px 40px rgba(7, 26, 68, .18); }
    .vs-team .nm { margin-top: 26px; font-size: 46px; font-weight: 850; letter-spacing: -1px; color: var(--navy); }
    .vs-mid { font-size: 64px; font-weight: 900; color: var(--blue); }
    .score-big { text-align: center; font-weight: 900; font-size: 230px; letter-spacing: -6px;
      color: var(--navy); line-height: 1; margin: 26px 0 10px; }
    .score-label { text-align: center; font-size: 32px; font-weight: 750; color: var(--muted); letter-spacing: 4px;
      text-transform: uppercase; }
    .bars { margin-top: 56px; display: flex; flex-direction: column; gap: 30px; }
    .bar-row { display: flex; align-items: center; gap: 24px; }
    .bar-row .who { width: 270px; font-size: 34px; font-weight: 800; color: var(--navy); }
    .bar-row .track { flex: 1; height: 34px; background: var(--soft); border-radius: 17px; overflow: hidden; }
    .bar-row .fill { height: 100%; border-radius: 17px; background: linear-gradient(90deg, var(--blue), var(--navy-2)); }
    .bar-row .pct { width: 120px; text-align: right; font-size: 34px; font-weight: 800; color: var(--blue); }
  </style>
</head>
<body>
  <main class="social-card">
    <div class="corner top-right"></div>
    <div class="corner bottom-left"></div>
    <div class="dots top">
      <span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="progress">{{progress}}</div>
    <header class="header">
      {{logo}}
      <div class="vdivider"></div>
      <div>
        <h2 class="brand-title">Build With <span>Abdallah</span></h2>
        <p class="brand-subtitle">The Pitch Agent <b>•</b> Independent Football Analytics</p>
      </div>
    </header>
    <section class="content">
      <h1 class="title">{{title}}</h1>
      <div class="meta">{{subtitle_meta}}</div>
      <div class="slot">{{content}}</div>
    </section>
    <footer class="footer">The Pitch Agent by BuildWithAbdallah | Independent analytics | Not affiliated with FIFA</footer>
    <div class="dots bottom">
      <span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
  </main>
</body>
</html>
