<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap');
    * { box-sizing: border-box; }
    body { margin: 0; width: 1080px; height: 1920px; background: #0b0f14; color: #f4f7fb; font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; }
    .frame { position: relative; width: 1080px; height: 1920px; padding: 116px 86px; background: linear-gradient(155deg, #0b0f14 0%, #101820 60%, #201916 100%); overflow: hidden; }
    .top { display: flex; justify-content: space-between; color: #9fb0c3; font-size: 30px; }
    .brand { font-weight: 800; }
    .brand-bw { color: #f4f7fb; }
    .brand-a  { color: #56d364; }
    .main { position: absolute; left: 86px; right: 86px; top: 500px; }
    h1 { margin: 0 0 44px; font-size: 82px; line-height: 1.04; letter-spacing: 0; }
    .caption { color: #cbd5e1; font-size: 46px; line-height: 1.22; }
    .cta-pill { position: absolute; left: 86px; right: 86px; bottom: 340px; background: #f4a261; color: #0b0f14; font-size: 42px; font-weight: 900; border-radius: 16px; padding: 28px 48px; text-align: center; }
    .url { position: absolute; left: 86px; right: 86px; bottom: 240px; color: #56d364; font-size: 38px; line-height: 1.18; font-weight: 900; text-decoration: underline; text-underline-offset: 6px; overflow-wrap: anywhere; text-align: center; }
    .geo-tr { position: absolute; top: 0; right: 0; width: 260px; opacity: .5; }
    .geo-bl { position: absolute; bottom: 60px; left: 48px; width: 90px; opacity: .3; fill: #56d364; }
    .wm { position: absolute; right: 58px; bottom: 54px; display: flex; align-items: center; gap: 14px; color: #8b949e; font-size: 28px; }
    .wm-img { width: 82px; height: 82px; object-fit: contain; }
    .wm-text { width: 82px; height: 82px; border: 3px solid #56d364; color: #56d364; display: grid; place-items: center; font-weight: 900; font-size: 22px; }
  </style>
</head>
<body>
  <div class="frame">
    <svg class="geo-tr" viewBox="0 0 260 220" xmlns="http://www.w3.org/2000/svg">
      <path d="M260 0 H80 L260 180 Z" fill="#0b2a6b"/>
      <path d="M260 0 H160 L260 110 Z" fill="#1d6cf2" opacity=".7"/>
    </svg>
    <svg class="geo-bl" viewBox="0 0 90 64" xmlns="http://www.w3.org/2000/svg">
      <circle cx="6"  cy="6"  r="3.5"/><circle cx="22" cy="6"  r="3.5"/><circle cx="38" cy="6"  r="3.5"/><circle cx="54" cy="6"  r="3.5"/><circle cx="70" cy="6"  r="3.5"/><circle cx="86" cy="6"  r="3.5"/>
      <circle cx="6"  cy="22" r="3.5"/><circle cx="22" cy="22" r="3.5"/><circle cx="38" cy="22" r="3.5"/><circle cx="54" cy="22" r="3.5"/><circle cx="70" cy="22" r="3.5"/><circle cx="86" cy="22" r="3.5"/>
      <circle cx="6"  cy="38" r="3.5"/><circle cx="22" cy="38" r="3.5"/><circle cx="38" cy="38" r="3.5"/><circle cx="54" cy="38" r="3.5"/><circle cx="70" cy="38" r="3.5"/><circle cx="86" cy="38" r="3.5"/>
      <circle cx="6"  cy="54" r="3.5"/><circle cx="22" cy="54" r="3.5"/><circle cx="38" cy="54" r="3.5"/><circle cx="54" cy="54" r="3.5"/><circle cx="70" cy="54" r="3.5"/><circle cx="86" cy="54" r="3.5"/>
    </svg>
    <div class="top">
      <div class="brand"><span class="brand-bw">Build With </span><span class="brand-a">Abdallah</span></div>
      <div>{{progress}}</div>
    </div>
    <main class="main">
      <h1>{{title}}</h1>
      <div class="caption">{{caption}}</div>
    </main>
    <div class="cta-pill">{{cta}}</div>
    <div class="url">{{url}}</div>
    <div class="wm">{{watermark}}</div>
  </div>
</body>
</html>
