<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap');
    * { box-sizing: border-box; }
    body { margin: 0; width: 1080px; height: 1920px; background: #0b0f14; color: #f4f7fb; font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; }
    .frame { position: relative; width: 1080px; height: 1920px; padding: 82px 58px; background: #0b0f14; overflow: hidden; }
    .top { display: flex; justify-content: space-between; color: #9fb0c3; font-size: 30px; }
    .brand { font-weight: 800; }
    .brand-bw { color: #f4f7fb; }
    .brand-a  { color: #2563eb; }
    h1 { margin: 72px 0 18px; font-size: 56px; line-height: 1.08; letter-spacing: 0; }
    .caption { margin-bottom: 28px; color: #cbd5e1; font-size: 36px; line-height: 1.24; }
    .label { font-size: 28px; font-weight: 900; margin: 18px 0 10px; }
    .before-label { color: #ff7b72; }
    .after-label  { color: #2563eb; }
    .code { background: #111820; border: 3px solid #263443; border-radius: 8px; padding: 26px 22px; font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace; font-size: 28px; line-height: 1.38; color: #e6edf3; box-shadow: 0 6px 24px rgba(0,0,0,.35); }
    .code div { white-space: pre; overflow: hidden; }
    .ln { display: inline-block; width: 48px; margin-right: 14px; color: #8b949e; }
    .takeaway { position: absolute; left: 58px; right: 58px; bottom: 182px; color: #f4f7fb; background: #142018; border-left: 8px solid #2563eb; padding: 24px 30px; font-size: 34px; line-height: 1.2; }
    .geo-tr { position: absolute; top: 0; right: 0; width: 220px; opacity: .4; }
    .geo-bl { position: absolute; bottom: 60px; left: 48px; width: 80px; opacity: .25; fill: #2563eb; }
    .wm { position: absolute; right: 48px; bottom: 42px; display: flex; align-items: center; gap: 12px; color: #8b949e; font-size: 26px; }
    .wm-img { width: 74px; height: 74px; object-fit: contain; }
    .wm-text { width: 74px; height: 74px; border: 3px solid #2563eb; color: #2563eb; display: grid; place-items: center; font-weight: 900; font-size: 20px; }
  </style>
</head>
<body>
  <div class="frame">
    <svg class="geo-tr" viewBox="0 0 260 220" xmlns="http://www.w3.org/2000/svg">
      <path d="M260 0 H80 L260 180 Z" fill="#0b2a6b"/>
      <path d="M260 0 H160 L260 110 Z" fill="#1d6cf2" opacity=".7"/>
    </svg>
    <svg class="geo-bl" viewBox="0 0 90 64" xmlns="http://www.w3.org/2000/svg">
      <circle cx="6"  cy="6"  r="3.5"/><circle cx="22" cy="6"  r="3.5"/><circle cx="38" cy="6"  r="3.5"/><circle cx="54" cy="6"  r="3.5"/><circle cx="70" cy="6"  r="3.5"/><circle cx="86" cy="6"  r="3.5"/>
      <circle cx="6"  cy="22" r="3.5"/><circle cx="22" cy="22" r="3.5"/><circle cx="38" cy="22" r="3.5"/><circle cx="54" cy="22" r="3.5"/><circle cx="70" cy="22" r="3.5"/><circle cx="86" cy="22" r="3.5"/>
      <circle cx="6"  cy="38" r="3.5"/><circle cx="22" cy="38" r="3.5"/><circle cx="38" cy="38" r="3.5"/><circle cx="54" cy="38" r="3.5"/><circle cx="70" cy="38" r="3.5"/><circle cx="86" cy="38" r="3.5"/>
      <circle cx="6"  cy="54" r="3.5"/><circle cx="22" cy="54" r="3.5"/><circle cx="38" cy="54" r="3.5"/><circle cx="54" cy="54" r="3.5"/><circle cx="70" cy="54" r="3.5"/><circle cx="86" cy="54" r="3.5"/>
    </svg>
    <div class="top">
      <div class="brand"><span class="brand-bw">Build With </span><span class="brand-a">Abdallah</span></div>
      <div>{{progress}}</div>
    </div>
    <h1>{{title}}</h1>
    <div class="caption">{{caption}}</div>
    <div class="label before-label">BEFORE</div>
    <div class="code">{{before_code}}</div>
    <div class="label after-label">AFTER</div>
    <div class="code">{{after_code}}</div>
    <div class="takeaway">{{takeaway}}</div>
    <div class="wm">{{watermark}}</div>
  </div>
</body>
</html>
