<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; width: 1080px; height: 1920px; background: #0b0f14; color: #f4f7fb; font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; }
    .frame { position: relative; width: 1080px; height: 1920px; padding: 82px 58px; background: #0b0f14; overflow: hidden; }
    .top { display: flex; justify-content: space-between; color: #9fb0c3; font-size: 30px; }
    .brand { color: #56d364; font-weight: 800; }
    h1 { margin: 78px 0 22px; font-size: 56px; line-height: 1.08; letter-spacing: 0; }
    .caption { margin-bottom: 34px; color: #cbd5e1; font-size: 36px; line-height: 1.24; }
    .label { font-size: 28px; font-weight: 900; margin: 22px 0 12px; }
    .before-label { color: #ff7b72; }
    .after-label { color: #56d364; }
    .code { background: #111820; border: 3px solid #263443; border-radius: 8px; padding: 28px 22px; font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace; font-size: 28px; line-height: 1.38; color: #e6edf3; }
    .code div { white-space: pre; overflow: hidden; }
    .ln { display: inline-block; width: 48px; margin-right: 14px; color: #6e7681; }
    .kw { color: #ffb86b; font-weight: 800; }
    .takeaway { position: absolute; left: 58px; right: 58px; bottom: 182px; color: #f4f7fb; background: #142018; border-left: 8px solid #56d364; padding: 24px 30px; font-size: 34px; line-height: 1.2; }
    .wm { position: absolute; right: 48px; bottom: 42px; display: flex; align-items: center; gap: 12px; color: #8b949e; font-size: 26px; }
    .wm-img { width: 74px; height: 74px; object-fit: contain; }
    .wm-text { width: 74px; height: 74px; border: 3px solid #56d364; color: #56d364; display: grid; place-items: center; font-weight: 900; }
  </style>
</head>
<body>
  <div class="frame">
    <div class="top"><div class="brand">Build With Abdallah</div><div>{{progress}}</div></div>
    <h1>{{title}}</h1>
    <div class="caption">{{caption}}</div>
    <div class="label before-label">BEFORE</div>
    <div class="code">{{before_code}}</div>
    <div class="label after-label">AFTER</div>
    <div class="code">{{after_code}}</div>
    <div class="takeaway">{{takeaway}}</div>
    <div class="wm">{{watermark}}</div>
  </div>
</body>
</html>
