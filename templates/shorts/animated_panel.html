<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;600;700;800;900&display=swap');
    /* Light brand theme — matches the matchday/recap social cards
       (match_recap_wide.html) so video and LinkedIn/FB posts look related. */
    :root {
      --navy: #071a44; --navy-2: #002b73; --blue: #0866ff; --blue-2: #2563eb;
      --text: #081b44; --muted: #40527a; --line: rgba(10, 42, 90, .13);
      --soft: rgba(8, 42, 96, .08); --bg: #f8fbff;
      --green: #16a34a; --red: #dc2626;
    }
    * { box-sizing: border-box; }
    body { margin: 0; width: 1080px; height: 1920px; color: var(--text);
           font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; }
    .frame { position: relative; width: 1080px; height: 1920px; padding: 116px 86px; overflow: hidden; isolation: isolate;
      background:
        radial-gradient(circle at 45% 40%, rgba(255,255,255,.92) 0 28%, transparent 58%),
        linear-gradient(160deg, #ffffff 0%, var(--bg) 58%, #ffffff 100%); }
    .frame::before { content: "A"; position: absolute; right: -40px; top: 320px; font-size: 720px;
      line-height: 1; font-weight: 900; letter-spacing: -60px; color: rgba(6, 35, 84, .045); z-index: -1; }
    .corner { position: absolute; width: 230px; height: 230px;
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-2) 100%);
      border: 5px solid var(--blue); box-shadow: 0 18px 35px rgba(7, 26, 68, .18); border-radius: 30px; }
    .corner.top-right { top: -115px; right: -115px; transform: rotate(30deg); }
    .corner.bottom-left { bottom: -120px; left: -120px; transform: rotate(63deg); }

    .top { display: flex; align-items: center; justify-content: space-between; color: var(--muted); font-size: 34px;
           animation: fadeDown .7s ease-out both; }
    .brand { font-weight: 800; }
    .brand-bw { color: var(--navy); }
    .brand-a  { color: var(--blue); }
    .progress { color: var(--blue); font-weight: 800; }

    .main { position: absolute; left: 86px; right: 86px; top: 330px; }
    h1 { margin: 0; font-family: Sora, Inter, sans-serif; font-size: 84px; line-height: 1.04; letter-spacing: -2px;
         color: var(--navy); text-transform: uppercase; max-width: 920px; padding-left: 32px;
         border-left: 12px solid var(--blue);
         animation: slideRight .8s cubic-bezier(.2,.9,.3,1) both; }
    .caption { margin-top: 36px; color: var(--muted); font-size: 42px; line-height: 1.22; max-width: 880px;
               animation: fadeUp .8s ease-out .25s both; }

    .rows { margin-top: 70px; display: flex; flex-direction: column; gap: 34px; }
    .arow { background: #ffffff; border: 2px solid var(--line); border-radius: 22px;
            box-shadow: 0 12px 28px rgba(7, 26, 68, .10);
            padding: 38px 42px; animation: slideRight .7s cubic-bezier(.2,.9,.3,1) both; }
    .arow:nth-child(1) { animation-delay: .55s; }
    .arow:nth-child(2) { animation-delay: 1.0s; }
    .arow:nth-child(3) { animation-delay: 1.45s; }
    .arow:nth-child(4) { animation-delay: 1.9s; }
    .arow .head { display: flex; justify-content: space-between; align-items: baseline; }
    .arow .match { font-size: 46px; font-weight: 800; color: var(--navy); }
    .arow .when { font-size: 32px; color: var(--muted); font-weight: 700; }
    .arow .sub { margin-top: 14px; font-size: 33px; color: var(--muted); }
    .arow .sub .ok { color: var(--green); font-weight: 900; }
    .arow .sub .bad { color: var(--red); font-weight: 900; }

    /* Animated probability bar */
    .barwrap { margin-top: 24px; height: 26px; border-radius: 13px; background: var(--line); overflow: hidden; }
    .bar { height: 100%; border-radius: 13px; background: linear-gradient(90deg, var(--blue-2), var(--blue));
           width: 0; animation: grow 1.3s cubic-bezier(.2,.9,.3,1) both; }
    .arow:nth-child(1) .bar { animation-delay: 1.0s; }
    .arow:nth-child(2) .bar { animation-delay: 1.45s; }
    .arow:nth-child(3) .bar { animation-delay: 1.9s; }
    .bar.w63 { --w: 63%; } .bar.w58 { --w: 58%; } .bar.w48 { --w: 48%; }
    .bar.w40 { --w: 40%; } .bar.w38 { --w: 38%; } .bar.w50 { --w: 50%; }
    .bar.w100 { --w: 100%; }

    /* Big stat strip */
    .stat { position: absolute; left: 86px; right: 86px; bottom: 250px; padding: 36px 42px;
            background: var(--soft); border-left: 12px solid var(--blue); border-radius: 0 22px 22px 0;
            font-size: 44px; font-weight: 800; color: var(--navy);
            animation: fadeUp .8s ease-out 2.3s both; }

    .wm { position: absolute; right: 58px; bottom: 54px; display: flex; gap: 14px; align-items: center;
          color: var(--muted); font-size: 28px; animation: fadeUp .6s ease-out .4s both; }
    .wm-img { width: 108px; height: 108px; object-fit: contain; }
    .wm-text { width: 108px; height: 108px; border: 3px solid var(--blue); color: var(--blue); display: grid;
               place-items: center; font-weight: 900; font-size: 30px; }

    @keyframes slideRight { from { opacity: 0; transform: translateX(-70px); } to { opacity: 1; transform: none; } }
    @keyframes fadeUp    { from { opacity: 0; transform: translateY(46px); }  to { opacity: 1; transform: none; } }
    @keyframes fadeDown  { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: none; } }
    @keyframes grow      { from { width: 0; } to { width: var(--w, 60%); } }
  </style>
</head>
<body>
  <div class="frame">
    <div class="corner top-right"></div>
    <div class="corner bottom-left"></div>
    <div class="top">
      <div class="brand"><span class="brand-bw">Build With </span><span class="brand-a">Abdallah</span></div>
      <div class="progress">{{progress}}</div>
    </div>
    <main class="main">
      <h1>{{title}}</h1>
      <div class="caption">{{caption}}</div>
      <div class="rows">{{rows}}</div>
    </main>
    <div class="stat">{{stat}}</div>
    <div class="wm">{{watermark}}</div>
  </div>
</body>
</html>
