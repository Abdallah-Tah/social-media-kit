<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; width: 1080px; height: 1920px; background: #0b0f14; color: #f4f7fb; font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; }
    .frame { position: relative; width: 1080px; height: 1920px; padding: 90px 72px; background: linear-gradient(180deg, #0b0f14 0%, #171113 100%); overflow: hidden; }
    .top { display: flex; justify-content: space-between; color: #9fb0c3; font-size: 30px; }
    .brand { color: #56d364; font-weight: 800; }
    h1 { margin: 120px 0 72px; font-size: 68px; line-height: 1.08; letter-spacing: 0; }
    .panel { border-radius: 8px; border: 3px solid #3b2526; background: #160d0f; padding: 46px; }
    .tag { color: #ff7b72; font-size: 34px; font-weight: 900; margin-bottom: 26px; }
    .caption { color: #f4f7fb; font-size: 48px; line-height: 1.2; }
    .fix { margin-top: 54px; border-radius: 8px; border: 3px solid #1f4a2b; background: #101b13; padding: 46px; }
    .fix .tag { color: #56d364; }
    .takeaway { color: #dbeafe; font-size: 42px; line-height: 1.22; }
    .wm { position: absolute; right: 54px; bottom: 52px; display: flex; align-items: center; gap: 12px; color: #8b949e; font-size: 26px; }
    .wm-img { width: 78px; height: 78px; object-fit: contain; }
    .wm-text { width: 78px; height: 78px; border: 3px solid #56d364; color: #56d364; display: grid; place-items: center; font-weight: 900; }
  </style>
</head>
<body>
  <div class="frame">
    <div class="top"><div class="brand">Build With Abdallah</div><div>{{progress}}</div></div>
    <h1>{{title}}</h1>
    <section class="panel"><div class="tag">MISTAKE</div><div class="caption">{{caption}}</div></section>
    <section class="fix"><div class="tag">FIX</div><div class="takeaway">{{takeaway}}</div></section>
    <div class="wm">{{watermark}}</div>
  </div>
</body>
</html>
