<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap');
    * { box-sizing: border-box; }
    body { margin: 0; width: 1080px; height: 1920px; background: #0b0f14; color: #f4f7fb; font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; }
    .frame { position: relative; width: 1080px; height: 1920px; padding: 82px 66px; background: linear-gradient(180deg, #0b0f14, #10151d); overflow: hidden; }
    .top { display: flex; justify-content: space-between; color: #9fb0c3; font-size: 30px; }
    .brand { font-weight: 800; }
    .brand-bw { color: #f4f7fb; }
    .brand-a  { color: #2563eb; }
    h1 { margin: 82px 0 28px; font-size: 60px; line-height: 1.08; letter-spacing: 0; }
    .caption { margin-bottom: 38px; color: #cbd5e1; font-size: 38px; line-height: 1.24; }
    .terminal { border-radius: 10px; overflow: hidden; border: 3px solid #30363d; background: #070b10; box-shadow: 0 22px 80px rgba(0,0,0,.45); }
    .bar { height: 58px; background: #1f2933; display: flex; align-items: center; gap: 12px; padding-left: 24px; }
    .dot { width: 18px; height: 18px; border-radius: 50%; background: #ff5f57; }
    .dot:nth-child(2) { background: #febc2e; }
    .dot:nth-child(3) { background: #28c840; }
    .body { padding: 34px 30px 42px; font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace; font-size: 35px; line-height: 1.55; color: #dbeafe; }
    .body div { white-space: pre; overflow: hidden; }
    .prompt { color: #2563eb; font-weight: 800; }
    .takeaway { position: absolute; left: 66px; right: 66px; bottom: 194px; color: #f4f7fb; border-top: 4px solid #f4a261; padding-top: 28px; font-size: 36px; line-height: 1.22; }
    .geo-tr { position: absolute; top: 0; right: 0; width: 220px; opacity: .4; }
    .geo-bl { position: absolute; bottom: 60px; left: 48px; width: 80px; opacity: .25; fill: #2563eb; }
    .wm { position: absolute; right: 52px; bottom: 48px; display: flex; align-items: center; gap: 12px; color: #8b949e; font-size: 26px; }
    .wm-img { width: 76px; height: 76px; object-fit: contain; }
    .wm-text { width: 76px; height: 76px; border: 3px solid #2563eb; color: #2563eb; display: grid; place-items: center; font-weight: 900; font-size: 20px; }
  </style>
</head>
<body>
  <div class="frame">
    <svg class="geo-tr" viewBox="0 0 260 220" xmlns="http://www.w3.org/2000/svg">
      <path d="M260 0 H80 L260 180 Z" fill="#0b2a6b"/>
      <path d="M260 0 H160 L260 110 Z" fill="#1d6cf2" opacity=".7"/>
    </svg>
    <svg class="geo-bl" viewBox="0 0 90 64" xmlns="http://www.w3.org/2000/svg">
      <circle cx="6"  cy="6"  r="3.5"/><circle cx="22" cy="6"  r="3.5"/><circle cx="38" cy="6"  r="3.5"/><circle cx="54" cy="6"  r="3.5"/><circle cx="70" cy="6"  r="3.5"/><circle cx="86" cy="6"  r="3.5"/>
      <circle cx="6"  cy="22" r="3.5"/><circle cx="22" cy="22" r="3.5"/><circle cx="38" cy="22" r="3.5"/><circle cx="54" cy="22" r="3.5"/><circle cx="70" cy="22" r="3.5"/><circle cx="86" cy="22" r="3.5"/>
      <circle cx="6"  cy="38" r="3.5"/><circle cx="22" cy="38" r="3.5"/><circle cx="38" cy="38" r="3.5"/><circle cx="54" cy="38" r="3.5"/><circle cx="70" cy="38" r="3.5"/><circle cx="86" cy="38" r="3.5"/>
      <circle cx="6"  cy="54" r="3.5"/><circle cx="22" cy="54" r="3.5"/><circle cx="38" cy="54" r="3.5"/><circle cx="54" cy="54" r="3.5"/><circle cx="70" cy="54" r="3.5"/><circle cx="86" cy="54" r="3.5"/>
    </svg>
    <div class="top">
      <div class="brand"><span class="brand-bw">Build With </span><span class="brand-a">Abdallah</span></div>
      <div>{{progress}}</div>
    </div>
    <h1>{{title}}</h1>
    <div class="caption">{{caption}}</div>
    <div class="terminal">
      <div class="bar"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
      <div class="body">{{commands}}</div>
    </div>
    <div class="takeaway">{{takeaway}}</div>
    <div class="wm">{{watermark}}</div>
  </div>
</body>
</html>
