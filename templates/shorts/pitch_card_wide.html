<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
    :root {
      --navy: #071a44; --navy-2: #002b73; --blue: #0866ff; --text: #081b44;
      --muted: #40527a; --line: rgba(10, 42, 90, .13); --soft: rgba(8, 42, 96, .08);
      --bg: #f8fbff;
    }
    * { box-sizing: border-box; }
    body { margin: 0; width: 1200px; height: 628px; color: var(--text);
           font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial, sans-serif; }
    .social-card { position: relative; width: 1200px; height: 628px; overflow: hidden; isolation: isolate;
      background:
        radial-gradient(circle at 45% 45%, rgba(255,255,255,.92) 0 28%, transparent 58%),
        linear-gradient(135deg, #ffffff 0%, var(--bg) 58%, #ffffff 100%); }
    .social-card::before { content: "A"; position: absolute; right: 90px; top: -50px; font-size: 560px;
      line-height: 1; font-weight: 900; letter-spacing: -52px; color: rgba(6, 35, 84, .045); z-index: -1; }
    .corner { position: absolute; width: 190px; height: 190px;
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-2) 100%);
      border: 4px solid var(--blue); box-shadow: 0 18px 35px rgba(7, 26, 68, .18); border-radius: 26px; }
    .corner.top-right { top: -95px; right: -95px; transform: rotate(30deg); }
    .corner.bottom-left { bottom: -100px; left: -100px; transform: rotate(63deg); }
    .dots { position: absolute; display: grid; grid-template-columns: repeat(6, 7px); gap: 13px; opacity: .45; }
    .dots span { width: 7px; height: 7px; border-radius: 50%; background: #6b8fca; }
    .dots.top { top: 24px; left: 24px; }
    .dots.bottom { right: 30px; bottom: 30px; }
    .header { position: absolute; top: 38px; left: 110px; display: flex; align-items: center; gap: 18px; }
    .logo-mark { width: 72px; height: 72px; object-fit: contain; }
    .logo-fallback { width: 72px; height: 72px; display: grid; place-items: center; font-weight: 900;
      font-size: 54px; color: var(--blue); letter-spacing: -6px; }
    .vdivider { width: 2px; height: 64px; background: var(--blue); opacity: .75; }
    .brand-title { margin: 0; font-size: 32px; line-height: 1; font-weight: 850; letter-spacing: -1px; color: var(--navy); }
    .brand-title span { color: var(--blue); }
    .brand-subtitle { margin: 9px 0 0; font-size: 11px; font-weight: 750; letter-spacing: 5px;
      text-transform: uppercase; color: var(--navy); }
    .brand-subtitle b { color: var(--blue); margin: 0 8px; }
    .content { position: absolute; left: 80px; right: 82px; top: 142px; }
    .title { margin: 0; font-size: 54px; line-height: .98; font-weight: 900; letter-spacing: -2px;
      text-transform: uppercase; color: var(--navy); }
    .meta { margin-top: 12px; display: flex; align-items: center; gap: 14px; font-size: 21px; color: var(--muted); }
    .meta .mdot { width: 7px; height: 7px; border-radius: 50%; background: var(--blue); display: inline-block; }
    .slot { margin-top: 22px; }
    .footer { position: absolute; left: 0; right: 0; bottom: 16px; text-align: center; font-size: 16px;
      font-style: italic; color: var(--navy); letter-spacing: -.2px; }
    /* rows */
    .rows { display: flex; flex-direction: column; }
    .row { display: flex; align-items: center; gap: 16px; padding: 15px 4px; border-bottom: 1.5px solid var(--line); }
    .row:last-child { border-bottom: none; }
    .row .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--blue); flex: 0 0 9px; }
    .row .label { font-size: 26px; font-weight: 800; color: var(--navy); flex: 1; }
    .row .tag { font-size: 21px; font-weight: 800; color: var(--blue); width: 230px; }
    .row .pct { font-size: 21px; font-weight: 800; color: var(--blue); width: 80px; }
    .row .grp { font-size: 19px; font-weight: 700; color: var(--muted); width: 105px; }
    .row .meta2 { font-size: 19px; font-weight: 600; color: var(--muted); width: 90px; text-align: right; }
    .row img.flag { width: 46px; height: 31px; object-fit: cover; border-radius: 4px;
      box-shadow: 0 2px 8px rgba(7, 26, 68, .18); }
  </style>
</head>
<body>
  <main class="social-card">
    <div class="corner top-right"></div>
    <div class="corner bottom-left"></div>
    <div class="dots top">
      <span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
    <header class="header">
      {{logo}}
      <div class="vdivider"></div>
      <div>
        <h2 class="brand-title">Build With <span>Abdallah</span></h2>
        <p class="brand-subtitle">The Pitch Agent <b>•</b> Independent Football Analytics</p>
      </div>
    </header>
    <section class="content">
      <h1 class="title">{{title}}</h1>
      <div class="meta">{{subtitle_meta}}</div>
      <div class="slot">{{content}}</div>
    </section>
    <footer class="footer">The Pitch Agent by BuildWithAbdallah | Independent analytics | Not affiliated with FIFA</footer>
    <div class="dots bottom">
      <span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
  </main>
</body>
</html>
