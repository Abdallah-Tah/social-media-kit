<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap');
    * { box-sizing: border-box; }
    body { margin: 0; width: 1080px; height: 1920px; background: #06111f; color: #f4f7fb; font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; }
    .frame { position: relative; width: 1080px; height: 1920px; padding: 116px 86px; overflow: hidden; background: radial-gradient(circle at 80% 10%, rgba(37,99,235,.28), transparent 32%), radial-gradient(circle at 10% 85%, rgba(29,108,242,.20), transparent 30%), linear-gradient(160deg, #06111f 0%, #0b1727 48%, #102a52 100%); }
    .top { display: flex; align-items: center; justify-content: space-between; color: #9fb0c3; font-size: 34px; }
    .brand { font-weight: 800; }
    .brand-bw { color: #f4f7fb; }
    .brand-a  { color: #2563eb; }
    .progress { color: #7aa7ff; font-weight: 800; }
    .main { position: absolute; left: 86px; right: 86px; top: 400px; }
    h1 { margin: 0; font-family: Sora, Inter, sans-serif; font-size: 84px; line-height: 1.04; letter-spacing: -2px; max-width: 920px; padding-left: 32px; border-left: 10px solid #2563eb; }
    .caption { margin-top: 54px; color: #cbd5e1; font-size: 44px; line-height: 1.22; max-width: 840px; }
    .idea { position: absolute; left: 86px; right: 86px; bottom: 210px; padding-top: 34px; border-top: 4px solid #263443; color: #e6edf3; font-size: 40px; line-height: 1.24; }
    .geo-tr { position: absolute; top: 0; right: 0; width: 260px; opacity: .5; }
    .geo-bl { position: absolute; bottom: 60px; left: 48px; width: 90px; opacity: .3; fill: #2563eb; }
    .wm { position: absolute; right: 58px; bottom: 54px; display: flex; gap: 14px; align-items: center; color: #8b949e; font-size: 28px; }
    .wm-img { width: 108px; height: 108px; object-fit: contain; }
    .wm-text { width: 108px; height: 108px; border: 3px solid #2563eb; color: #2563eb; display: grid; place-items: center; font-weight: 900; font-size: 30px; }
  </style>
</head>
<body>
  <div class="frame">
    <svg class="geo-tr" viewBox="0 0 260 220" xmlns="http://www.w3.org/2000/svg">
      <path d="M260 0 H80 L260 180 Z" fill="#0b2a6b"/>
      <path d="M260 0 H160 L260 110 Z" fill="#1d6cf2" opacity=".7"/>
    </svg>
    <svg class="geo-bl" viewBox="0 0 90 64" xmlns="http://www.w3.org/2000/svg">
      <circle cx="6"  cy="6"  r="3.5"/><circle cx="22" cy="6"  r="3.5"/><circle cx="38" cy="6"  r="3.5"/><circle cx="54" cy="6"  r="3.5"/><circle cx="70" cy="6"  r="3.5"/><circle cx="86" cy="6"  r="3.5"/>
      <circle cx="6"  cy="22" r="3.5"/><circle cx="22" cy="22" r="3.5"/><circle cx="38" cy="22" r="3.5"/><circle cx="54" cy="22" r="3.5"/><circle cx="70" cy="22" r="3.5"/><circle cx="86" cy="22" r="3.5"/>
      <circle cx="6"  cy="38" r="3.5"/><circle cx="22" cy="38" r="3.5"/><circle cx="38" cy="38" r="3.5"/><circle cx="54" cy="38" r="3.5"/><circle cx="70" cy="38" r="3.5"/><circle cx="86" cy="38" r="3.5"/>
      <circle cx="6"  cy="54" r="3.5"/><circle cx="22" cy="54" r="3.5"/><circle cx="38" cy="54" r="3.5"/><circle cx="54" cy="54" r="3.5"/><circle cx="70" cy="54" r="3.5"/><circle cx="86" cy="54" r="3.5"/>
    </svg>
    <div class="top">
      <div class="brand"><span class="brand-bw">Build With </span><span class="brand-a">Abdallah</span></div>
      <div class="progress">{{progress}}</div>
    </div>
    <main class="main">
      <h1>{{title}}</h1>
      <div class="caption">{{caption}}</div>
    </main>
    <div class="idea">{{main_idea}}</div>
    <div class="wm">{{watermark}}</div>
  </div>
</body>
</html>
