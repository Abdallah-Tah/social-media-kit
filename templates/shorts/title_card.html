<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; width: 1080px; height: 1920px; background: #0b0f14; color: #f4f7fb; font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; }
    .frame { position: relative; width: 1080px; height: 1920px; padding: 116px 86px; overflow: hidden; background: linear-gradient(160deg, #0b0f14 0%, #101820 55%, #182016 100%); }
    .top { display: flex; align-items: center; justify-content: space-between; color: #9fb0c3; font-size: 34px; }
    .brand { color: #56d364; font-weight: 800; }
    .progress { color: #f4a261; font-weight: 800; }
    .main { position: absolute; left: 86px; right: 86px; top: 440px; }
    .label { display: inline-block; color: #f4a261; font-size: 34px; font-weight: 800; margin-bottom: 36px; }
    h1 { margin: 0; font-size: 86px; line-height: 1.04; letter-spacing: 0; max-width: 900px; }
    .caption { margin-top: 58px; color: #cbd5e1; font-size: 46px; line-height: 1.22; max-width: 840px; }
    .idea { position: absolute; left: 86px; right: 86px; bottom: 210px; padding-top: 34px; border-top: 4px solid #263443; color: #e6edf3; font-size: 42px; line-height: 1.24; }
    .wm { position: absolute; right: 58px; bottom: 54px; display: flex; gap: 14px; align-items: center; color: #8b949e; font-size: 28px; }
    .wm-img { width: 82px; height: 82px; object-fit: contain; }
    .wm-text { width: 82px; height: 82px; border: 3px solid #56d364; color: #56d364; display: grid; place-items: center; font-weight: 900; }
  </style>
</head>
<body>
  <div class="frame">
    <div class="top"><div class="brand">Build With Abdallah</div><div class="progress">{{progress}}</div></div>
    <main class="main">
      <div class="label">{{short_type}}</div>
      <h1>{{title}}</h1>
      <div class="caption">{{caption}}</div>
    </main>
    <div class="idea">{{main_idea}}</div>
    <div class="wm">{{watermark}}</div>
  </div>
</body>
</html>
